name: Build 3DS Homebrew

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest   # official devkitPro Docker image with devkitARM

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install 3DS libraries
        run: |
          dkp-pacman -Sy --noconfirm \
            3ds-dev \
            3ds-citro2d \
            3ds-citro3d \
            3ds-libctru

      - name: Download single-header audio decoders
        run: |
          cd source
          curl -fsSL -O https://raw.githubusercontent.com/mackron/dr_libs/master/dr_mp3.h
          curl -fsSL -O https://raw.githubusercontent.com/mackron/dr_libs/master/dr_flac.h
          curl -fsSL -O https://raw.githubusercontent.com/mackron/dr_libs/master/dr_wav.h
          curl -fsSL -O https://raw.githubusercontent.com/nothings/stb/master/stb_vorbis.c

      - name: Create required directories and icon
        run: |
          mkdir -p romfs build
          # Generate a simple 48x48 purple placeholder icon
          apt-get install -y --no-install-recommends imagemagick 2>/dev/null || true
          if command -v convert &>/dev/null; then
            convert -size 48x48 xc:#7C3AFF \
              -fill white -pointsize 10 -gravity center -annotate 0 "AUD" \
              icon.png
          else
            # Fallback: minimal valid 48x48 PNG (purple solid)
            python3 - <<'EOF'
import struct, zlib

def make_png(w, h, color):
    def chunk(name, data):
        c = zlib.crc32(name + data) & 0xffffffff
        return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
    r, g, b = color
    raw = b''
    for _ in range(h):
        row = bytes([0]) + bytes([r, g, b] * w)
        raw += row
    compressed = zlib.compress(raw)
    png  = b'\x89PNG\r\n\x1a\n'
    png += chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
    png += chunk(b'IDAT', compressed)
    png += chunk(b'IEND', b'')
    return png

with open('icon.png', 'wb') as f:
    f.write(make_png(48, 48, (0x7C, 0x3A, 0xFF)))
EOF
          fi

      - name: Build
        run: make
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITARM: /opt/devkitpro/devkitARM

      - name: Upload .3dsx artifact
        uses: actions/upload-artifact@v4
        with:
          name: audioplayer-3dsx
          path: audioplayer.3dsx
          if-no-files-found: error

      - name: Upload .smdh artifact
        uses: actions/upload-artifact@v4
        with:
          name: audioplayer-smdh
          path: audioplayer.smdh
          if-no-files-found: warn
